<!DOCTYPE html>
<html>

<head>

<title>Milk Market</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,Arial;
}

body{

min-height:100vh;

background:
linear-gradient(120deg,#001f3f99,#800080aa),
url("https://images.unsplash.com/photo-1563636619-e9143da7973b");

background-size:cover;
background-position:center;
color:white;

}


/* HOME */

.home{

height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

}


.logo{

font-size:60px;
color:#fff700;
animation:wave 2s infinite alternate;

}


@keyframes wave{

from{
transform:scale(1);
text-shadow:0 0 20px yellow;
}

to{
transform:scale(1.1);
text-shadow:0 0 50px white;
}

}



.sign{

margin-top:40px;
padding:20px 70px;
border-radius:50px;
background:#00ff88;
color:#111;
font-size:25px;
cursor:pointer;
font-weight:bold;

}




/* FORM */


.form{

display:none;

width:90%;
max-width:450px;

margin:60px auto;

padding:30px;

background:#ffffff33;

backdrop-filter:blur(20px);

border-radius:30px;

}



input{

width:100%;
padding:15px;
margin:12px 0;

border-radius:20px;
border:none;

font-size:16px;

}


button{

width:100%;
padding:15px;

border:none;

border-radius:25px;

font-size:18px;

cursor:pointer;

}



.save{

background:#ffe600;

}



/* MARKET */


.market{

display:none;
padding:30px;

}



.filters{

display:flex;
gap:20px;

}


.filters button{

background:#00ff88;

}



.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

margin-top:30px;

}




.card{

background:white;

color:#222;

border-radius:35px;

padding:25px;

box-shadow:0 20px 50px #0008;

}



.avatar{

text-align:center;

}


.avatar img{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

border:6px solid #00c6ff;

}




.card h2{

text-align:center;

color:#0074D9;

margin:15px;

}




.tag{

background:#00cc66;

color:white;

padding:8px 20px;

border-radius:30px;

display:block;

width:max-content;

margin:auto;

}




.phone{

margin-top:20px;

padding:15px;

background:#0074D9;

color:white;

border-radius:20px;

text-align:center;

}



.copy{

margin-top:10px;

background:#ff851b;

color:white;

font-size:14px;

}




.milk{

margin-top:15px;

background:#ffe600;

padding:15px;

border-radius:20px;

text-align:center;

font-weight:bold;

}


</style>

</head>


<body>



<div class="home" id="home">


<div class="logo">

🥛 FARM LINK 🐄

</div>


<div class="sign" onclick="openForm()">

SIGN IN

</div>


</div>





<div class="form" id="form">


<h2>Add Profile</h2>


<input type="file" id="image">


<input id="username" placeholder="Full Name">


<input id="phone" placeholder="Phone Number">


<input id="qty" placeholder="Milk Quantity">


<button class="save" onclick="save()">

SAVE

</button>


</div>








<div class="market" id="market">


<h1 class="logo">

FARM MARKET

</h1>



<div class="filters">


<button onclick="buyers()">

BUYERS

</button>


<button onclick="sellers()">

SELLERS

</button>


</div>




<div id="cards" class="cards"></div>


</div>

<script>

// SUPABASE CONNECTION

const supabaseUrl =
"https://lodmurghhqejitmvaflv.supabase.co";

const supabaseKey =
"sb_publishable_iovNYRuAZsvym4lilDhS8Q_20pk9ZKM";


const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);



let list=[];



// LOAD USERS FROM DATABASE

window.onload=function(){

loadUsers();

};




async function loadUsers(){


let {data,error}=await client
.from("milk_profiles")
.select("*")
.order("id",{ascending:false});



if(error){

console.log(error);

return;

}



list=data.map(x=>({

image:x.image,

name:x.name,

phone:x.phone,

qty:x.quantity,

type:x.type

}));


show(list);


}






function openForm(){


document.getElementById("home").style.display="none";


document.getElementById("form").style.display="block";


}






async function save(){



let img =
document.getElementById("image");


let username =
document.getElementById("username").value;


let phone =
document.getElementById("phone").value;


let qty =
document.getElementById("qty").value;




let reader=new FileReader();




reader.onload=async function(){



let obj={


image:reader.result,

name:username,

phone:phone,

quantity:qty,

type:
Math.random()>0.5
?
"buyer"
:
"supplier"

};




// INSERT INTO SUPABASE


let {error}=await client
.from("milk_profiles")
.insert([obj]);



if(error){

alert("Error saving data");

console.log(error);

return;

}



alert("Profile Added");



// reload database

loadUsers();



document.getElementById("form").style.display="none";


document.getElementById("market").style.display="block";



}




reader.readAsDataURL(img.files[0]);



}









function show(data){


let out="";



data.forEach(x=>{


out+=`

<div class="card">


<div class="avatar">

<img src="${x.image}">

</div>



<h2>${x.name}</h2>


<div class="tag">

${x.type}

</div>



<div class="phone">


📞 ${x.phone}


<button class="copy"
onclick="copy('${x.phone}')">

COPY PHONE

</button>


</div>




<div class="milk">

🥛 ${x.qty}

</div>



</div>


`;



});




document.getElementById("cards").innerHTML=out;


}







function buyers(){


show(
list.filter(
x=>x.type=="buyer"
)
);


}






function sellers(){


show(
list.filter(
x=>x.type=="supplier"
)
);


}







function copy(n){


navigator.clipboard.writeText(n);


alert("Copied "+n);


}



</script>






















</body>

</html>
